services:
  server:
    build: ./server
    container_name: meshconnect-server
    volumes:
      - ./data:/root/data:Z
    env_file:
      - ./server/.env
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: meshconnect-dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro,Z
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ./dashboard/.htpasswd:/etc/nginx/.htpasswd:ro,Z
      - ./certbot/conf:/etc/letsencrypt:ro,Z
      - ./certbot/www:/var/www/certbot:ro,Z
    command: /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    restart: unless-stopped
    depends_on:
      - server

  certbot:
    image: certbot/certbot:latest
    container_name: meshconnect-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt:Z
      - ./certbot/www:/var/www/certbot:Z
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  duckdns:
    image: curlimages/curl:latest
    container_name: meshconnect-duckdns
    env_file:
      - ./server/.env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    entrypoint: /bin/sh -c "while :; do curl -fsS \"https://www.duckdns.org/update?domains=$$DUCKDNS_DOMAIN&token=$$DUCKDNS_TOKEN&ip=\" >/dev/null || true; sleep 5m; done"
    restart: unless-stopped
