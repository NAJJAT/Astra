version: '3.8'

services:
  server:
    build: ./server
    container_name: meshconnect-server
    ports:
      - "8081:8443"
    volumes:
      - ./data:/root/data
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: meshconnect-dashboard
    ports:
      - "8082:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - server
