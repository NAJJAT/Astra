<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshConnect Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── LOGIN ── */
        #login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-logo {
            font-size: 24px;
            font-weight: 700;
            color: #60a5fa;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-sub {
            color: #475569;
            text-align: center;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #60a5fa; }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #2563eb; }
        .login-error {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        /* ── DASHBOARD ── */
        #dashboard-page { display: none; }

        .header {
            background: #1e293b;
            border-bottom: 1px solid #1e293b;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-logo { font-size: 18px; font-weight: 700; color: #60a5fa; }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .refresh-info { font-size: 12px; color: #334155; }
        .btn-logout {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #64748b;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-logout:hover { background: #1e293b; color: #94a3b8; }

        .content {
            padding: 28px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Stats */
        .stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat {
            background: #1e293b;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 18px 24px;
            min-width: 110px;
        }
        .stat-val { font-size: 30px; font-weight: 700; }
        .stat-lbl { font-size: 12px; color: #475569; margin-top: 2px; }
        .stat.green .stat-val { color: #34d399; }
        .stat.red   .stat-val { color: #f87171; }
        .stat.blue  .stat-val { color: #60a5fa; }

        /* Section header */
        .section-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title { font-size: 18px; font-weight: 600; }
        .section-sub { font-size: 13px; color: #475569; margin-left: 8px; }
        .btn-refresh {
            padding: 7px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 7px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-refresh:hover { background: #334155; color: #e2e8f0; }
        .btn-refresh.spin { animation: spin 0.6s ease; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Device grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 16px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            border-left: 3px solid #334155;
            transition: border-color 0.2s, transform 0.1s;
        }
        .card:hover { transform: translateY(-1px); }
        .card.online  { border-left-color: #34d399; }
        .card.offline { border-left-color: #f87171; opacity: 0.85; }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .card-icon { font-size: 28px; line-height: 1; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }
        .badge.online  { background: rgba(52,211,153,.12); color: #34d399; }
        .badge.offline { background: rgba(248,113,113,.12); color: #f87171; }
        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .dot.pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50%     { opacity: .35; }
        }

        .card-name  { font-size: 16px; font-weight: 600; color: #f1f5f9; margin-bottom: 2px; }
        .card-model { font-size: 12px; color: #64748b; margin-bottom: 14px; }

        /* Metrics with progress bars */
        .metrics { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .metric-label { color: #94a3b8; display: flex; align-items: center; gap: 5px; }
        .metric-value { color: #cbd5e1; font-weight: 600; font-variant-numeric: tabular-nums; }
        .bar {
            height: 6px;
            background: #0f172a;
            border-radius: 3px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease, background 0.2s;
        }
        .bar-fill.battery   { background: linear-gradient(90deg, #34d399, #10b981); }
        .bar-fill.battery.low  { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .bar-fill.battery.crit { background: linear-gradient(90deg, #f87171, #ef4444); }
        .bar-fill.ram       { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
        .bar-fill.storage   { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }

        .footer-row {
            display: flex;
            gap: 14px;
            font-size: 11px;
            color: #64748b;
            padding-top: 10px;
            border-top: 1px solid #0f172a;
            flex-wrap: wrap;
        }
        .footer-row .item { display: inline-flex; align-items: center; gap: 4px; }

        .no-status {
            font-size: 12px;
            color: #475569;
            font-style: italic;
            padding: 14px 0;
            text-align: center;
        }

        /* Command buttons */
        .actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #0f172a;
        }
        .btn-cmd {
            flex: 1;
            padding: 7px 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .btn-cmd:hover:not(:disabled) {
            background: #1e3a5f;
            border-color: #3b82f6;
            color: #e2e8f0;
        }
        .btn-cmd:active:not(:disabled) { transform: scale(0.97); }
        .btn-cmd:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-cmd.busy {
            background: #1e3a5f;
            border-color: #3b82f6;
        }

        /* Screenshot modal */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 24px;
            cursor: zoom-out;
        }
        .modal-bg.show { display: flex; }
        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: default;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #cbd5e1;
            font-size: 14px;
        }
        .modal-close {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .modal-close:hover { background: #334155; }
        .modal-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions a {
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
        }
        .modal-actions a:hover { background: #2563eb; }

        /* Toast */
        .toasts {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            pointer-events: none;
        }
        .toast {
            background: #1e293b;
            border: 1px solid #334155;
            border-left: 3px solid #3b82f6;
            border-radius: 8px;
            padding: 11px 16px;
            color: #e2e8f0;
            font-size: 13px;
            min-width: 240px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: toastIn 0.2s ease;
            pointer-events: auto;
        }
        .toast.success { border-left-color: #34d399; }
        .toast.error   { border-left-color: #f87171; }
        @keyframes toastIn {
            from { transform: translateX(20px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* Empty state */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
            color: #334155;
        }
        .empty-icon { font-size: 52px; margin-bottom: 16px; }
        .empty h3 { font-size: 18px; color: #475569; margin-bottom: 8px; }
        .empty p  { font-size: 14px; }
    </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-page">
    <div class="login-box">
        <div class="login-logo">🔷 MeshConnect</div>
        <div class="login-sub">Device Management Dashboard</div>
        <div class="form-group">
            <label>Username</label>
            <input id="username" type="text" placeholder="admin" autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" onclick="login()">Sign In</button>
        <div class="login-error" id="login-error">Invalid username or password</div>
    </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard-page">
    <div class="header">
        <div class="header-logo">🔷 MeshConnect</div>
        <div class="header-right">
            <span class="refresh-info">Auto-refresh: 5s</span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="content">
        <div class="stats">
            <div class="stat blue">
                <div class="stat-val" id="s-total">0</div>
                <div class="stat-lbl">Total Devices</div>
            </div>
            <div class="stat green">
                <div class="stat-val" id="s-online">0</div>
                <div class="stat-lbl">Online</div>
            </div>
            <div class="stat red">
                <div class="stat-val" id="s-offline">0</div>
                <div class="stat-lbl">Offline</div>
            </div>
        </div>

        <div class="section-hdr">
            <div>
                <span class="section-title">Devices</span>
                <span class="section-sub" id="device-count"></span>
            </div>
            <button class="btn-refresh" id="btn-refresh" onclick="manualRefresh()">↻ Refresh</button>
        </div>

        <div class="grid" id="grid">
            <div class="empty">
                <div class="empty-icon">📱</div>
                <h3>No devices connected</h3>
                <p>Install the Android app and tap "Start Service"</p>
            </div>
        </div>
    </div>
</div>

<div class="toasts" id="toasts"></div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span id="modal-title">Screenshot</span>
            <button class="modal-close" onclick="closeModal()">✕ Close</button>
        </div>
        <img class="modal-img" id="modal-img" alt="Screenshot">
        <div class="modal-actions">
            <a id="modal-open" target="_blank" rel="noopener">Open in new tab</a>
            <a id="modal-download" download>Download</a>
        </div>
    </div>
</div>

<script>
    const CREDS = { user: 'admin', pass: 'admin123' };
    const API   = '/api/devices';
    let timer   = null;

    window.addEventListener('load', () => {
        if (sessionStorage.getItem('auth') === '1') showDashboard();
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });
    });

    function login() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if (u === CREDS.user && p === CREDS.pass) {
            sessionStorage.setItem('auth', '1');
            showDashboard();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.removeItem('auth');
        clearInterval(timer);
        document.getElementById('dashboard-page').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('password').value = '';
        document.getElementById('login-error').style.display = 'none';
    }

    function showDashboard() {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        fetchDevices();
        timer = setInterval(fetchDevices, 5000);
    }

    document.getElementById('grid').addEventListener('click', e => {
        const btn = e.target.closest('.btn-cmd');
        if (!btn || btn.disabled) return;
        runCommand(btn);
    });

    async function runCommand(btn) {
        const id   = btn.dataset.id;
        const cmd  = btn.dataset.cmd;
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.classList.add('busy');
        btn.innerHTML = '…';
        try {
            const r = await fetch(`/api/devices/${encodeURIComponent(id)}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            });
            if (!r.ok) {
                const err = await r.json().catch(() => ({}));
                toast(`${cmd} failed: ${err.error || r.status}`, 'error');
                return;
            }
            const data = await r.json();
            if (cmd === 'ping') {
                toast(`Ping: ${data.latency_ms} ms`, 'success');
            } else if (cmd === 'get_info') {
                toast(`Info refreshed (${data.latency_ms} ms)`, 'success');
                setTimeout(fetchDevices, 200);
            } else if (cmd === 'screenshot') {
                toast(`Screenshot captured (${data.latency_ms} ms)`, 'success');
                openScreenshot(data.screenshot_url, btn.dataset.id);
            } else {
                toast(`${cmd} ✓ (${data.latency_ms} ms)`, 'success');
            }
        } catch (e) {
            toast(`${cmd} failed: network error`, 'error');
        } finally {
            btn.disabled = false;
            btn.classList.remove('busy');
            btn.innerHTML = orig;
        }
    }

    function toast(text, kind = '') {
        const t = document.createElement('div');
        t.className = 'toast ' + kind;
        t.textContent = text;
        document.getElementById('toasts').appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    function openScreenshot(url, deviceId) {
        const cacheBust = `${url}?t=${Date.now()}`;
        document.getElementById('modal-img').src = cacheBust;
        document.getElementById('modal-open').href = cacheBust;
        document.getElementById('modal-download').href = cacheBust;
        document.getElementById('modal-download').download =
            `screenshot-${deviceId.slice(0,8)}-${Date.now()}.jpg`;
        document.getElementById('modal-title').textContent =
            `Screenshot · ${deviceId.slice(0,12)}…`;
        document.getElementById('modal').classList.add('show');
    }
    function closeModal(e) {
        if (e && e.target.id !== 'modal' && e.type !== 'click') return;
        document.getElementById('modal').classList.remove('show');
        document.getElementById('modal-img').src = '';
    }
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    function manualRefresh() {
        const btn = document.getElementById('btn-refresh');
        btn.classList.remove('spin');
        void btn.offsetWidth;
        btn.classList.add('spin');
        fetchDevices();
    }

    async function fetchDevices() {
        try {
            const r = await fetch(API);
            if (!r.ok) return;
            render(await r.json());
        } catch (e) { /* server unreachable */ }
    }

    function render(list) {
        const online  = list.filter(d => d.online).length;
        const offline = list.length - online;
        document.getElementById('s-total').textContent  = list.length;
        document.getElementById('s-online').textContent = online;
        document.getElementById('s-offline').textContent= offline;

        const grid = document.getElementById('grid');

        if (!list.length) {
            document.getElementById('device-count').textContent = '';
            grid.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">📱</div>
                    <h3>No devices connected</h3>
                    <p>Install the Android app and tap "Start Service"</p>
                </div>`;
            return;
        }

        document.getElementById('device-count').textContent =
            `${list.length} total · ${online} online`;

        list.sort((a, b) => b.online - a.online);

        grid.innerHTML = list.map(renderCard).join('');
    }

    function renderCard(d) {
        const cls   = d.online ? 'online' : 'offline';
        const label = d.online ? 'Online' : 'Offline';
        const name  = esc(d.name || d.model || 'Unknown Device');
        const maker = esc(d.manufacturer || '');
        const model = esc(d.model || '');
        const os    = esc(d.os_version || '?');
        const id    = esc((d.id || '?').slice(0, 12));
        const s     = d.status || {};
        const hasStatus = s.ram_total > 0 || s.battery > 0 || s.updated_at;

        const statusBlock = hasStatus ? renderStatus(s) : `
            <div class="no-status">No status received yet…</div>`;

        return `
        <div class="card ${cls}">
            <div class="card-top">
                <div class="card-icon">📱</div>
                <div class="badge ${cls}">
                    <div class="dot ${d.online ? 'pulse' : ''}"></div>
                    ${label}
                </div>
            </div>
            <div class="card-name">${name}</div>
            <div class="card-model">${maker} ${model} · ${id}…</div>

            ${statusBlock}

            <div class="footer-row">
                <span class="item">${netIcon(s.network)} ${esc(s.network || '?')}</span>
                <span class="item">🤖 Android ${os}</span>
                <span class="item">⏱ ${uptime(s.uptime)}</span>
                <span class="item" style="margin-left:auto">${ago(d.last_seen)}</span>
            </div>

            <div class="actions">
                <button class="btn-cmd" data-id="${d.id}" data-cmd="ping"       ${d.online ? '' : 'disabled'}>📡 Ping</button>
                <button class="btn-cmd" data-id="${d.id}" data-cmd="get_info"   ${d.online ? '' : 'disabled'}>↻ Refresh</button>
                <button class="btn-cmd" data-id="${d.id}" data-cmd="vibrate"    ${d.online ? '' : 'disabled'}>📳 Vibrate</button>
                <button class="btn-cmd" data-id="${d.id}" data-cmd="screenshot" ${d.online ? '' : 'disabled'}>📷 Screenshot</button>
            </div>
        </div>`;
    }

    function renderStatus(s) {
        const battPct = clamp(s.battery, 0, 100);
        const battCls = battPct < 15 ? 'crit' : battPct < 35 ? 'low' : '';
        const ramPct  = pct(s.ram_used, s.ram_total);
        const stoPct  = pct(s.storage_used, s.storage_total);

        return `
        <div class="metrics">
            <div>
                <div class="metric-row">
                    <span class="metric-label">${battIcon(battPct, s.charging)} Battery</span>
                    <span class="metric-value">${battPct}%${s.charging ? ' ⚡' : ''}</span>
                </div>
                <div class="bar"><div class="bar-fill battery ${battCls}" style="width:${battPct}%"></div></div>
            </div>

            <div>
                <div class="metric-row">
                    <span class="metric-label">🧠 RAM</span>
                    <span class="metric-value">${fmtGB(s.ram_used)} / ${fmtGB(s.ram_total)}</span>
                </div>
                <div class="bar"><div class="bar-fill ram" style="width:${ramPct}%"></div></div>
            </div>

            <div>
                <div class="metric-row">
                    <span class="metric-label">💾 Storage</span>
                    <span class="metric-value">${fmtGB(s.storage_used)} / ${fmtGB(s.storage_total)}</span>
                </div>
                <div class="bar"><div class="bar-fill storage" style="width:${stoPct}%"></div></div>
            </div>
        </div>`;
    }

    /* helpers */
    const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, Number(n) || 0));
    const pct   = (a, b) => b > 0 ? Math.round((a / b) * 100) : 0;
    const fmtGB = b => {
        if (!b) return '–';
        const gb = b / (1024 ** 3);
        return gb >= 10 ? gb.toFixed(0) + ' GB' : gb.toFixed(1) + ' GB';
    };
    function uptime(ms) {
        if (!ms || ms <= 0) return '–';
        const s = Math.floor(ms / 1000);
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        if (d) return `${d}d ${h}h`;
        if (h) return `${h}h ${m}m`;
        return `${m}m`;
    }
    function netIcon(net) {
        switch (net) {
            case 'wifi':     return '📶';
            case 'cellular': return '📡';
            case 'ethernet': return '🔌';
            case 'none':     return '⊘';
            default:         return '🌐';
        }
    }
    function battIcon(pct, charging) {
        if (charging) return '🔌';
        if (pct >= 80) return '🔋';
        if (pct >= 40) return '🔋';
        if (pct >= 15) return '🪫';
        return '🪫';
    }

    function esc(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function ago(ts) {
        if (!ts) return 'Never';
        const sec = Math.floor((Date.now() - new Date(ts)) / 1000);
        if (sec <  5) return 'just now';
        if (sec < 60) return sec + 's ago';
        if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
        return new Date(ts).toLocaleTimeString();
    }
</script>
</body>
